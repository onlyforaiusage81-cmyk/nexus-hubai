<title>Sign in — Nexus Hub</title><meta name="description" content="Buyer sign-in for the Nexus Hub tool portal.">

<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#0b0c0e;--canvas-elevated:#15161a;
  --primary:#da291c;--primary-hot:#ff3b2f;--primary-active:#b01e0a;
  --hairline:#212329;--ink:#f5f5f3;--body:#9da0a6;--muted:#63666d;
  --sans:'Inter',-apple-system,system-ui,sans-serif;
  --disp:'Archivo','Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  --xxxs:4px;--xxs:8px;--xs:16px;--sm:24px;--md:32px;--lg:48px;--xl:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--canvas);color:var(--body);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
::selection{background:var(--primary);color:#fff}
:focus-visible{outline:2px solid var(--primary-hot);outline-offset:3px}

.nav{border-bottom:1px solid var(--hairline)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 var(--sm);display:flex;align-items:center;justify-content:space-between;height:66px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand .mark{height:40px;width:auto;flex:none;display:block}.brand .mark-icon{display:none}
.back-link{font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--body);transition:color .2s}
.back-link:hover{color:var(--ink)}

.wrap-center{flex:1;display:flex;align-items:center;justify-content:center;padding:var(--xl) var(--sm)}
.card{width:100%;max-width:400px;background:var(--canvas-elevated);border:1px solid var(--hairline);padding:var(--lg) var(--md);position:relative}
.card::before{content:"";position:absolute;top:-1px;left:0;width:64px;height:2px;background:var(--primary)}

.eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);display:block;margin-bottom:var(--xs)}
.eyebrow::before{content:"/ ";color:var(--primary);font-weight:700}
h1{font-family:var(--disp);font-size:28px;font-weight:640;letter-spacing:-.02em;color:var(--ink);margin-bottom:8px;font-variation-settings:'wdth' 112}
.lead{font-size:14px;line-height:1.6;color:var(--body);margin-bottom:var(--md)}

.field{display:flex;flex-direction:column;gap:8px;margin-bottom:var(--sm)}
.field label{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--body)}
.field input{
  background:var(--canvas);border:1px solid var(--hairline);border-radius:0;color:var(--ink);
  font-family:var(--sans);font-size:14px;padding:14px var(--xs);transition:border-color .2s,box-shadow .2s;
}
.field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(218,41,28,.15)}

.btn{
  position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;
  font-family:var(--mono);font-size:12.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  height:50px;padding:0 var(--md);border:1px solid transparent;border-radius:0;
  cursor:pointer;transition:border-color .2s,color .2s,transform .1s;white-space:nowrap;
  isolation:isolate;overflow:hidden;color:#fff;background:var(--primary);
}
.btn:hover{background:var(--primary-active)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.6;cursor:not-allowed}

.error-msg{display:none;font-family:var(--mono);font-size:12px;color:var(--primary-hot);background:rgba(218,41,28,.1);border:1px solid rgba(218,41,28,.35);padding:10px 12px;margin-bottom:var(--sm)}
.error-msg.show{display:block}

.foot-note{text-align:center;padding:var(--lg) 0;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em}
</style></head>

<div class="wrap-center">
  <form class="card" id="login-form" novalidate>
    <span class="eyebrow">Buyer access</span>
    <h1>Sign in</h1>
    <p class="lead">Enter your buyer credentials to access your tools.</p>
    <div class="error-msg" id="error-msg"></div>
    <div class="field"><label for="name">Name</label><input id="name" name="name" type="text" autocomplete="username" required></div>
    <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
    <button class="btn" type="submit" id="submit-btn">Sign in</button>
  </form>
</div>

<p class="foot-note">&copy; 2026 Soumyajit Majumder &middot; Nexus Hub</p>

<script>
(function(){
  var form=document.getElementById('login-form');
  var errorEl=document.getElementById('error-msg');
  var btn=document.getElementById('submit-btn');
  form.addEventListener('submit',function(e){
    e.preventDefault();
    errorEl.classList.remove('show');
    errorEl.textContent='';
    btn.disabled=true;
    btn.textContent='Signing in…';
    var name=document.getElementById('name').value;
    var password=document.getElementById('password').value;
    fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:name,password:password})
    }).then(function(r){return r.json().then(function(data){return {status:r.status,data:data};});})
      .then(function(res){
        if(res.data && res.data.ok){
          window.location.href=res.data.redirect||'/portal';
        } else {
          errorEl.textContent=(res.data && res.data.error) || 'Sign in failed. Please try again.';
          errorEl.classList.add('show');
          btn.disabled=false;
          btn.textContent='Sign in';
        }
      }).catch(function(){
        errorEl.textContent='Something went wrong. Please try again.';
        errorEl.classList.add('show');
        btn.disabled=false;
        btn.textContent='Sign in';
      });
  });
})();
</script>
